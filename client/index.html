<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bezaw Admin | Command Center</title>
  <link rel="icon" type="image/png" href="/assets/photo_2026-01-02_16-03-59-removebg-preview.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    html {
      font-size: 11px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #fdfaf6;
      color: #1e293b;
      overflow: hidden;
      margin: 0;
      height: 100vh;
      width: 100vw;
    }

    /* Advanced Liquid Morphology */
    @keyframes morph {
      0% {
        border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
        transform: rotate(0deg);
      }

      34% {
        border-radius: 70% 30% 46% 54% / 30% 29% 71% 70%;
      }

      67% {
        border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%;
      }

      100% {
        border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
        transform: rotate(360deg);
      }
    }

    .animate-morph {
      animation: morph 20s linear infinite;
    }

    @keyframes float-soft {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-10px) rotate(1deg);
      }
    }

    .animate-float-soft {
      animation: float-soft 6s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    .shimmer-bg {
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      background-size: 200% 100%;
      animation: shimmer 3s infinite;
    }

    /* Glass Utility */
    .glass-deep {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
    }

    /* Viewport Constraint */
    #root {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
      /* Thinner scrollbar */
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.05);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.1);
    }
  </style>

</head>

<body class="bg-[#fdfaf6]">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
